{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <h2 style="text-align: center; margin-bottom: 1rem;">Reset Password</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">
            Verify your identity to set a new password.
        </p>

        <form action="{{ url_for('forgot_password') }}" method="POST" data-turbo="false">
            <div class="form-group">
                <label>Registered Email</label>
                <input type="email" name="email" required placeholder="yourname@college.edu">
            </div>

            <div class="form-group" style="position: relative;">
                <label>Verification OTP</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" name="otp" id="otpInput" required placeholder="123456" maxlength="6" style="flex: 1; letter-spacing: 2px;">
                    <button type="button" id="sendOtpBtn" onclick="requestOtp()" style="padding: 0 1rem; border-radius: 8px; border: 1px solid var(--primary); background: white; color: var(--primary); font-weight: 600; cursor: pointer; transition: all 0.2s;">Send OTP</button>
                </div>
                <div id="otpStatusMsg" style="font-size: 0.82rem; margin-top: 0.5rem; display: none;"></div>
            </div>

            <div class="form-group" style="position: relative;">
                <label>New Password</label>
                <input type="password" name="new_password" id="newPassword" required placeholder="••••••••"
                    style="padding-right: 2.8rem;">
                <span class="toggle-password" onclick="togglePassword('newPassword', this)"
                    style="position: absolute; right: 0.9rem; top: 2.65rem; cursor: pointer; color: #94a3b8; font-size: 1.1rem; user-select: none;">👁️</span>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Reset Password</button>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Remembered it? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Back to
                    Login</a>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePassword(fieldId, btn) {
        const field = document.getElementById(fieldId);
        field.type = (field.type === 'password') ? 'text' : 'password';
        btn.textContent = (field.type === 'text') ? '🙈' : '👁️';
    }

    async function requestOtp() {
        const emailInput = document.querySelector('input[name="email"]');
        const email = emailInput.value.trim();
        const msgDiv = document.getElementById('otpStatusMsg');
        const btn = document.getElementById('sendOtpBtn');

        if (!email) {
            msgDiv.style.display = 'block';
            msgDiv.style.color = '#ef4444';
            msgDiv.textContent = 'Please enter your email first.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Sending...';
        msgDiv.style.display = 'none';

        try {
            const res = await fetch("{{ url_for('send_otp') }}", {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email})
            });
            const data = await res.json();
            
            msgDiv.style.display = 'block';
            if (data.status === 'success') {
                msgDiv.style.color = '#10b981';
                msgDiv.textContent = '✅ ' + data.message;
                
                // Cooldown timer
                let timeLeft = 60;
                const timer = setInterval(() => {
                    btn.textContent = `Resend in ${timeLeft}s`;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        btn.disabled = false;
                        btn.textContent = 'Send OTP';
                    }
                    timeLeft -= 1;
                }, 1000);
            } else {
                msgDiv.style.color = '#ef4444';
                msgDiv.textContent = '❌ ' + data.message;
                btn.disabled = false;
                btn.textContent = 'Send OTP';
            }
        } catch (e) {
            msgDiv.style.display = 'block';
            msgDiv.style.color = '#ef4444';
            msgDiv.textContent = 'Error connecting to server.';
            btn.disabled = false;
            btn.textContent = 'Send OTP';
        }
    }
</script>
{% endblock %}
