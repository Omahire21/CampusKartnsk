{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <h2 style="text-align: center; margin-bottom: 1rem;">Reset Password</h2>
        <p style="text-align: center; color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">
            Verify your identity to set a new password.
        </p>

        <form action="{{ url_for('forgot_password') }}" method="POST">
            <div class="form-group">
                <label>Registered Email</label>
                <input type="email" name="email" required placeholder="yourname@college.edu">
            </div>

            <div class="form-group" style="margin-bottom: 2rem;">
                <label>Which college did you register with? (Security Check)</label>
                <select name="college" required>
                    <option value="" disabled selected>Select your registered college</option>
                    {% for college in colleges %}
                    <option value="{{ college }}">{{ college }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group" style="position: relative;">
                <label>New Password</label>
                <input type="password" name="new_password" id="newPassword" required placeholder="••••••••"
                    style="padding-right: 2.8rem;">
                <i class="fas fa-eye" id="togglePswd"
                    style="position: absolute; right: 1rem; top: 2.3rem; color: var(--text-muted); cursor: pointer; padding: 0.5rem; border-radius: 5px;"></i>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Reset Password</button>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Remembered it? <a href="{{ url_for('login') }}" style="color: var(--primary); font-weight: 600;">Back to
                    Login</a>
            </div>
        </form>
    </div>
</div>

<script>
    const togglePswd = document.querySelector('#togglePswd');
    const newPassword = document.querySelector('#newPassword');

    togglePswd.addEventListener('click', function (e) {
        const type = newPassword.getAttribute('type') === 'password' ? 'text' : 'password';
        newPassword.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });
</script>
{% endblock %}
