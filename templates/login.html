{% extends 'base.html' %}

{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>

        <!-- Tab Switcher -->
        <div class="auth-tabs">
            <a href="{{ url_for('login') }}" class="auth-tab active">Login</a>
            <a href="{{ url_for('register') }}" class="auth-tab">Register</a>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" required placeholder="yourname@college.edu">
            </div>
            <div class="form-group" style="position: relative;">
                <label>Password
                    <a href="{{ url_for('forgot_password') }}" class="forgot-link"
                        style="float: right; font-size: 0.82rem; color: var(--primary); text-decoration: none; font-weight: 500;">Forgot?</a>
                </label>
                <input type="password" name="password" id="loginPassword" required placeholder="••••••••"
                    style="padding-right: 2.8rem;">
                <span class="toggle-password" onclick="togglePassword('loginPassword', this)"
                    style="position: absolute; right: 0.9rem; top: 2.65rem; cursor: pointer; color: #94a3b8; font-size: 1.1rem; user-select: none;">👁️</span>
            </div>

            <!-- Removed Terms & Conditions Checkbox as per user request -->

            <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
        </form>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            New here? <a href="{{ url_for('register') }}" style="color: var(--primary);">Create an account</a>
        </p>
    </div>
</div>

<style>
    .auth-tabs {
        display: flex;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid var(--border);
        margin-bottom: 1.5rem;
    }

    .auth-tab {
        flex: 1;
        text-align: center;
        padding: 0.65rem;
        text-decoration: none;
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text-muted);
        background: transparent;
        transition: all 0.2s ease;
    }

    .auth-tab.active {
        background: var(--primary);
        color: #fff;
    }

    .auth-tab:hover:not(.active) {
        background: #f1f5f9;
    }

    .forgot-link:hover {
        text-decoration: underline !important;
    }

    .terms-group {
        margin: 0.4rem 0 1.1rem;
    }

    .checkbox-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.88rem;
        color: var(--text-muted);
        cursor: pointer;
    }

    .checkbox-label input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--primary);
        cursor: pointer;
        flex-shrink: 0;
    }
</style>

<script>
    function togglePassword(fieldId, btn) {
        const field = document.getElementById(fieldId);
        if (field.type === 'password') {
            field.type = 'text';
            btn.textContent = '🙈';
        } else {
            field.type = 'password';
            btn.textContent = '👁️';
        }
    }
</script>
{% endblock %}
